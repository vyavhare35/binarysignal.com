<!-- Arena edit: SAFE clean layout + auto-start. Does not move React nodes, so bot won't get stuck. -->
<style id="arena-safe-clean-css">
  body.arena-clean-mode { background:#0b0e14 !important; }
  body.arena-clean-mode #root{
    min-height:100vh !important;
  }
  body.arena-clean-mode .arena-hidden-object,
  body.arena-clean-mode .arena-prealert-hidden{
    display:none !important;
    visibility:hidden !important;
  }
  body.arena-clean-mode .arena-ancestor{
    display:contents !important;
    visibility:visible !important;
  }
  body.arena-clean-mode .arena-keep,
  body.arena-clean-mode .arena-keep *{
    visibility:visible !important;
  }
  body.arena-clean-mode .arena-chart-card{
    display:block !important;
    width:min(96vw, 980px) !important;
    margin:14px auto !important;
  }
  body.arena-clean-mode .arena-timeframe-bar{
    display:flex !important;
    width:min(96vw, 980px) !important;
    margin:14px auto 0 auto !important;
    justify-content:flex-end !important;
  }
  body.arena-clean-mode .arena-active-signal-card,
  body.arena-clean-mode .arena-prealert-card{
    display:block !important;
    width:min(96vw, 520px) !important;
    margin:14px auto !important;
  }
  body.arena-clean-mode .arena-signal-history-card{
    display:block !important;
    width:min(96vw, 980px) !important;
    margin:8px auto 14px auto !important;
  }
  body.arena-clean-mode #arena-no-signal-box{
    display:block;
    width:min(96vw, 520px);
    margin:14px auto;
    color:#9ca3af;
    background:rgba(31,41,55,.5);
    border:1px solid rgba(75,85,99,.5);
    border-radius:16px;
    padding:22px;
    font:700 14px system-ui,-apple-system,Segoe UI,sans-serif;
    text-align:center;
  }
</style>
<script id="arena-safe-clean-js">
(function(){
  function txt(el){ return (el && el.textContent || '').replace(/\s+/g,' ').trim(); }
  function closestCard(el){
    var cur = el;
    while(cur && cur.id !== 'root'){
      var c = cur.className || '';
      if(typeof c === 'string' && (c.indexOf('rounded-2xl') !== -1 || c.indexOf('border-2') !== -1)) return cur;
      cur = cur.parentElement;
    }
    return el;
  }
  function findActiveSignal(root){
    // Search deepest/inner elements first. If parent container is selected,
    // whole UI gets preserved, so reverse scan is important.
    var nodes = root.querySelectorAll('div,section,article,span');
    for(var i=nodes.length-1;i>=0;i--){
      var t = txt(nodes[i]);
      if(t.indexOf('ACTIVE SIGNAL') !== -1 && t.length < 1200) return closestCard(nodes[i]);
    }
    return null;
  }
  function findPreAlert(root){
    // Keep yellow/orange pre-alert banner: "SIGNAL INCOMING".
    // Search deepest/inner elements first to avoid preserving the entire page.
    var nodes = root.querySelectorAll('div,section,article,span');
    for(var i=nodes.length-1;i>=0;i--){
      var t = txt(nodes[i]);
      if(t.indexOf('SIGNAL INCOMING') !== -1 && t.length < 1600) return closestCard(nodes[i]);
    }
    return null;
  }
  function findChart(root){
    var canvas = root.querySelector('canvas.cursor-crosshair') || root.querySelector('canvas');
    if(!canvas) return null;
    var cur = canvas;
    while(cur && cur.id !== 'root'){
      var c = cur.className || '';
      if(typeof c === 'string' && c.indexOf('rounded-2xl') !== -1) return cur;
      cur = cur.parentElement;
    }
    return canvas.parentElement || canvas;
  }
  function findTimeframe(root){
    var wrap = root.querySelector('.arena-time-sound');
    if(wrap) return wrap;
    var labels = {'1m':1,'5m':1,'15m':1,'30m':1,'1h':1};
    var buttons = Array.prototype.slice.call(root.querySelectorAll('button'));
    for(var i=0;i<buttons.length;i++){
      var btxt = txt(buttons[i]);
      if(!labels[btxt]) continue;
      var cur = buttons[i].parentElement;
      while(cur && cur.id !== 'root'){
        var bs = Array.prototype.slice.call(cur.querySelectorAll('button')).map(txt).filter(Boolean);
        var count = bs.filter(function(x){return labels[x];}).length;
        if(count >= 4) return cur;
        cur = cur.parentElement;
      }
    }
    return null;
  }
  function clearMarks(root){
    root.querySelectorAll('.arena-hidden-object,.arena-prealert-hidden,.arena-ancestor,.arena-keep,.arena-chart-card,.arena-timeframe-bar,.arena-signal-history-card,.arena-prealert-card,.arena-active-signal-card').forEach(function(el){
      el.classList.remove('arena-hidden-object','arena-prealert-hidden','arena-ancestor','arena-keep','arena-chart-card','arena-timeframe-bar','arena-signal-history-card','arena-prealert-card','arena-active-signal-card');
    });
  }
  function markKeep(el, type){
    if(!el) return;
    el.classList.add('arena-keep');
    if(type) el.classList.add(type);
    var cur = el.parentElement;
    while(cur && cur.id !== 'root'){
      cur.classList.add('arena-ancestor');
      cur = cur.parentElement;
    }
  }
  function isPreserved(el){
    return el.classList.contains('arena-keep') || el.classList.contains('arena-ancestor') || !!el.closest('.arena-keep');
  }
  function findSignalHistory(root){
    return root.querySelector('.arena-signal-history');
  }
  function placeholder(show){
    var box = document.getElementById('arena-no-signal-box');
    if(show){
      if(!box){
        box = document.createElement('div');
        box.id = 'arena-no-signal-box';
        box.textContent = 'No ACTIVE SIGNAL yet';
        document.body.appendChild(box);
      }
      box.style.display = 'block';
    }else if(box){
      box.style.display = 'none';
    }
  }
  function apply(){
    var root = document.getElementById('root');
    if(!root) return;
    document.body.classList.add('arena-clean-mode');
    clearMarks(root);

    var chart = findChart(root);
    var timeframe = findTimeframe(root);
    var prealert = findPreAlert(root);
    var history = findSignalHistory(root);
    var signal = findActiveSignal(root);

    markKeep(timeframe, 'arena-timeframe-bar');
    markKeep(chart, 'arena-chart-card');
    markKeep(history, 'arena-signal-history-card');
    markKeep(prealert, 'arena-prealert-card');
    markKeep(signal, 'arena-active-signal-card');
    placeholder(!signal);

    Array.prototype.slice.call(root.querySelectorAll('*')).forEach(function(el){
      if(!isPreserved(el)) el.classList.add('arena-hidden-object');
    });
  }
  var timer = setInterval(apply, 700);
  window.addEventListener('load', apply);
  document.addEventListener('DOMContentLoaded', apply);
})();
</script>


<style id="arena-result-popup-css">
  #arena-result-popup{position:fixed;top:18px;left:50%;transform:translateX(-50%) translateY(-20px);z-index:99999;min-width:260px;max-width:90vw;padding:14px 18px;border-radius:18px;font:800 14px system-ui,-apple-system,Segoe UI,sans-serif;text-align:center;color:white;box-shadow:0 18px 50px rgba(0,0,0,.45);opacity:0;pointer-events:none;transition:all .25s ease}
  #arena-result-popup.show{opacity:1;transform:translateX(-50%) translateY(0)}
  #arena-result-popup.win{background:linear-gradient(135deg,rgba(16,185,129,.95),rgba(6,95,70,.95));border:1px solid rgba(110,231,183,.6)}
  #arena-result-popup.loss{background:linear-gradient(135deg,rgba(239,68,68,.95),rgba(127,29,29,.95));border:1px solid rgba(252,165,165,.6)}
</style>
<script id="arena-result-popup-js">
(function(){
  var initialized=false, seen=new Set(), lastKey='';
  function popup(text, isWin){
    var el=document.getElementById('arena-result-popup');
    if(!el){el=document.createElement('div');el.id='arena-result-popup';document.body.appendChild(el)}
    el.className=(isWin?'win':'loss'); el.textContent=text; void el.offsetWidth; el.classList.add('show');
    setTimeout(function(){el.classList.remove('show')},3800);
  }
  function scan(){
    var boxes=document.querySelectorAll('.arena-signal-history > div:last-child > div');
    var keys=[];
    boxes.forEach(function(b){var t=(b.textContent||'').replace(/\s+/g,' ').trim(); if(/\b(WIN|LOSS)\b/.test(t)) keys.push(t)});
    if(!initialized){keys.forEach(function(k){seen.add(k)}); initialized=true; return;}
    keys.forEach(function(k){
      if(!seen.has(k)){
        seen.add(k); lastKey=k;
        var isWin=/\bWIN\b/.test(k);
        popup((isWin?'✅ ':'❌ ')+k, isWin);
      }
    });
  }
  setInterval(scan,800); window.addEventListener('load',scan);
})();
</script>
